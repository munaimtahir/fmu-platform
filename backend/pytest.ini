[pytest]
DJANGO_SETTINGS_MODULE = sims_backend.test_settings
python_files = test_*.py *_test.py
addopts =
    --cov=sims_backend
    --cov=core
    --cov-report=html
    --cov-report=term-missing
    --strict-markers
    --tb=short
    -q
testpaths = tests

[coverage:run]
source = 
    sims_backend
    core
omit =
    */management/commands/*
    */migrations/*
    */tests/*
    */test_*.py
    venv/*
    */venv/*
    */wsgi.py
    */asgi.py
    */admin.py
    */apps.py
    sims_backend/students/imports/*
    apps/intake/*
